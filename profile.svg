<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="55" fill="#f1f5f9" opacity="0.95"/>
  
  <!-- Hair -->
  <path d="M 150 100 Q 145 70 200 65 Q 255 70 250 100" fill="#1a1a1a"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="125" rx="48" ry="55" fill="#e2e8f0"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="115" r="5" fill="#0f172a"/>
  <circle cx="215" cy="115" r="5" fill="#0f172a"/>
  <circle cx="187" cy="113" r="2" fill="#ffffff"/>
  <circle cx="217" cy="113" r="2" fill="#ffffff"/>
  
  <!-- Nose -->
  <line x1="200" y1="125" x2="200" y2="135" stroke="#0f172a" stroke-width="2"/>
  
  <!-- Mouth -->
  <path d="M 185 145 Q 200 155 215 145" stroke="#0f172a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Ears -->
  <ellipse cx="150" cy="125" rx="10" ry="20" fill="#e2e8f0"/>
  <ellipse cx="250" cy="125" rx="10" ry="20" fill="#e2e8f0"/>
  
  <!-- Body/Shirt -->
  <rect x="140" y="175" width="120" height="140" rx="20" fill="#1a1a1a"/>
  
  <!-- Shirt accent -->
  <rect x="160" y="220" width="80" height="60" rx="10" fill="#2563eb" opacity="0.8"/>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="80" cy="80" r="3" fill="#60a5fa"/>
    <circle cx="320" cy="320" r="3" fill="#60a5fa"/>
    <line x1="100" y1="50" x2="120" y2="70" stroke="#60a5fa" stroke-width="1"/>
    <line x1="300" y1="350" x2="320" y2="370" stroke="#60a5fa" stroke-width="1"/>
  </g>
  
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#f1f5f9" opacity="0.7">
    A B KAMAL
  </text>
</svg>
